<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI聊天助手 - NewWebAI</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .chat-container {
            height: 80vh;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: linear-gradient(90deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            color: white;
            padding: 15px 20px;
        }
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #f8f9fa;
        }
        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            position: relative;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user-message {
            background-color: var(--primary-color);
            color: white;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }
        .ai-message {
            background-color: white;
            color: #333;
            margin-right: auto;
            border-bottom-left-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .chat-input {
            padding: 15px;
            background-color: white;
            border-top: 1px solid #eee;
        }
        .chat-input .form-control {
            border-radius: 50px;
            padding: 12px 20px;
        }
        .chat-input .btn {
            border-radius: 50px;
            padding: 10px 25px;
        }
        .typing-indicator {
            display: inline-block;
            padding: 12px 16px;
            background-color: white;
            border-radius: 18px;
            color: #666;
            margin-right: auto;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .typing-indicator span {
            height: 8px;
            width: 8px;
            float: left;
            margin: 0 2px;
            background-color: #9E9EA1;
            display: block;
            border-radius: 50%;
            opacity: 0.4;
        }
        .typing-indicator span:nth-of-type(1) {
            animation: typing 1s infinite;
        }
        .typing-indicator span:nth-of-type(2) {
            animation: typing 1s infinite 0.2s;
        }
        .typing-indicator span:nth-of-type(3) {
            animation: typing 1s infinite 0.4s;
        }
        @keyframes typing {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .model-selector {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container-fluid py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card chat-container">
                    <div class="chat-header d-flex justify-content-between align-items-center">
                        <div>
                            <h5 class="mb-0"><i class="fas fa-robot me-2"></i>AI 聊天助手</h5>
                            <small>由 NewWebAI 提供支持</small>
                        </div>
                        <div class="d-flex align-items-center">
                            <select class="form-select model-selector" id="modelSelect">
                                <option value="gpt-4">GPT-4</option>
                                <option value="claude">Claude</option>
                                <option value="llama">Llama 3</option>
                            </select>
                            <button class="btn btn-light btn-sm ms-2" id="clearChat">
                                <i class="fas fa-trash"></i> 清空
                            </button>
                        </div>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        <div class="message ai-message">
                            您好！我是NewWebAI智能助手，有什么我可以帮您的吗？您可以问我任何问题，我会尽力为您解答。
                        </div>
                    </div>
                    <div class="chat-input">
                        <div class="d-flex">
                            <input type="text" class="form-control me-2" id="messageInput" placeholder="输入您的消息..." autocomplete="off">
                            <button class="btn btn-primary" id="sendMessage">
                                <i class="fas fa-paper-plane me-1"></i> 发送
                            </button>
                        </div>
                        <div class="mt-2">
                            <small class="text-muted">提示：AI助手可以回答问题、创作文字、表达观点等。请确保您的提问符合使用条款。</small>
                        </div>
                    </div>
                </div>
                
                <div class="mt-4">
                    <h4>AI 功能特性</h4>
                    <div class="row">
                        <div class="col-md-4">
                            <div class="card h-100 text-center">
                                <div class="card-body">
                                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                                        <i class="fas fa-lightbulb fs-3"></i>
                                    </div>
                                    <h5 class="card-title">创意写作</h5>
                                    <p class="card-text">帮助您创作文章、故事、诗歌等创意内容。</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card h-100 text-center">
                                <div class="card-body">
                                    <div class="bg-success text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                                        <i class="fas fa-code fs-3"></i>
                                    </div>
                                    <h5 class="card-title">代码生成</h5>
                                    <p class="card-text">协助编写代码、调试和优化程序。</p>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card h-100 text-center">
                                <div class="card-body">
                                    <div class="bg-info text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px;">
                                        <i class="fas fa-chart-bar fs-3"></i>
                                    </div>
                                    <h5 class="card-title">数据分析</h5>
                                    <p class="card-text">分析数据并提供洞察和建议。</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatMessages = document.getElementById('chatMessages');
            const messageInput = document.getElementById('messageInput');
            const sendMessageBtn = document.getElementById('sendMessage');
            const clearChatBtn = document.getElementById('clearChat');
            const modelSelect = document.getElementById('modelSelect');
            
            // 添加消息到聊天窗口
            function addMessage(text, isUser = false) {
                const messageDiv = document.createElement('div');
                messageDiv.classList.add('message');
                messageDiv.classList.add(isUser ? 'user-message' : 'ai-message');
                messageDiv.textContent = text;
                chatMessages.appendChild(messageDiv);
                
                // 滚动到底部
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            // 显示打字指示器
            function showTypingIndicator() {
                const typingDiv = document.createElement('div');
                typingDiv.classList.add('typing-indicator');
                typingDiv.id = 'typingIndicator';
                typingDiv.innerHTML = '<span></span><span></span><span></span>';
                chatMessages.appendChild(typingDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            // 隐藏打字指示器
            function hideTypingIndicator() {
                const typingIndicator = document.getElementById('typingIndicator');
                if (typingIndicator) {
                    typingIndicator.remove();
                }
            }
            
            // 模拟AI响应
            function getAIResponse(userMessage) {
                const model = modelSelect.value;
                const responses = {
                    'gpt-4': {
                        greeting: '您好！我是GPT-4模型，有什么我可以帮您的吗？',
                        default: `我理解您想了解关于"${userMessage}"的信息。作为GPT-4模型，我可以为您提供详细的回答和分析。`,
                        thanks: '不客气！如果您有其他问题，随时问我。',
                        howareyou: '我很好，谢谢！您呢？我随时准备回答您的问题。'
                    },
                    'claude': {
                        greeting: '您好！我是Claude模型，很高兴为您服务。请问您需要什么帮助？',
                        default: `关于"${userMessage}"，我的分析如下：Claude模型注重提供有用、无害和诚实的回应。`,
                        thanks: '感谢您的认可！如果您有更多问题，我很乐意继续帮助您。',
                        howareyou: '我运行良好，随时准备协助您！您今天过得怎么样？'
                    },
                    'llama': {
                        greeting: '您好！我是Llama 3模型，我能帮您解答各种问题。',
                        default: `对于关于"${userMessage}"的问题，Llama 3模型可以提供基于知识的详细回答。`,
                        thanks: '谢谢！如果您有其他问题，尽管问我。',
                        howareyou: '我状态良好，准备为您服务！您有什么问题吗？'
                    }
                };
                
                const currentModelResponses = responses[model];
                
                // 简单的关键词匹配
                if (userMessage.toLowerCase().includes('你好') || userMessage.toLowerCase().includes('您好')) {
                    return currentModelResponses.greeting;
                } else if (userMessage.toLowerCase().includes('谢谢') || userMessage.toLowerCase().includes('感谢')) {
                    return currentModelResponses.thanks;
                } else if (userMessage.toLowerCase().includes('你好吗') || userMessage.toLowerCase().includes('怎么样')) {
                    return currentModelResponses.howareyou;
                } else {
                    return currentModelResponses.default;
                }
            }
            
            // 发送消息处理
            function sendMessage() {
                const message = messageInput.value.trim();
                if (message) {
                    // 添加用户消息
                    addMessage(message, true);
                    messageInput.value = '';
                    
                    // 显示打字指示器
                    showTypingIndicator();
                    
                    // 模拟AI思考时间并返回响应
                    setTimeout(() => {
                        hideTypingIndicator();
                        const aiResponse = getAIResponse(message);
                        addMessage(aiResponse, false);
                    }, 1000 + Math.random() * 1000); // 随机延迟1-2秒
                }
            }
            
            // 事件监听器
            sendMessageBtn.addEventListener('click', sendMessage);
            
            messageInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
            
            clearChatBtn.addEventListener('click', function() {
                chatMessages.innerHTML = '<div class="message ai-message">对话已清空。您可以开始新的对话。</div>';
            });
            
            // 示例对话
            setTimeout(() => {
                addMessage('我是NewWebAI的AI助手，我可以帮助您回答问题、创作内容等。请问我可以帮您什么？', false);
            }, 500);
        });
    </script>
</body>
</html>
